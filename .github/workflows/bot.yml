name: Run Telegram Watchdog Bot

on:
  push:
    branches: [ "main" ]
  schedule:
    # Har 5 ghante me auto-restart karega taaki bot continuous chalta rahe
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        run: python watchdog.py
